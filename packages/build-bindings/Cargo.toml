[package]
name = "build-bindings"
repository = "https://github.com/Kensaa/3DPrinter"
description = ""
version = "1.0.0"
authors = ["Kensa"]
edition = "2018"

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = []
convert = ["dep:image", "dep:obj"]

[dependencies]
wasm-bindgen = "0.2.122"
flate2 = { version = "1.0.17", features = [
    "zlib-rs",
], default-features = false }
serde = { version = "1.0.228", features = ["derive"] }
base64 = "0.22.1"
obj = { version = "0.10.2", optional = true }
js-sys = "0.3.99"
console_error_panic_hook = "0.1.7"
image = { version = "0.25.10", default-features = false, features = [
    "default-formats",
], optional = true }
ciborium = "0.2.2"
phf = { version = "0.13.1", features = ["macros"] }
strum_macros = "0.28"
strum = { version = "0.28.0", features = ["derive"] }
serde-wasm-bindgen = "0.6.5"

[dev-dependencies]
wasm-bindgen-test = "0.3.34"

[profile.release]
opt-level = "s"
lto = true        # link-time optimization — bigger impact than opt-level
codegen-units = 1 # slower build but smaller/faster output
panic = "abort"   # removes panic unwinding code, reduces size

[profile.release-node]
inherits = "release"
opt-level = 3        # optimize for speed
