[package]
name = "compression"
license = "MIT"
repository = "https://github.com/Kensaa/3DPrinter"
description = ""
version = "1.0.0"
authors = ["Kensa"]
edition = "2018"

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = []

[dependencies]
wasm-bindgen = "0.2.84"
flate2 = { version = "1.0.17", features = [
    "zlib-rs",
], default-features = false }

[dev-dependencies]
wasm-bindgen-test = "0.3.34"

[profile.release]
opt-level = "s"
lto = true        # link-time optimization — bigger impact than opt-level
codegen-units = 1 # slower build but smaller/faster output
panic = "abort"   # removes panic unwinding code, reduces size

[profile.release-node]
inherits = "release"
opt-level = 3        # optimize for speed
